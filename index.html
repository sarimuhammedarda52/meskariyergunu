<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOT-M MES SİSTEMİ</title>
    <link rel="icon" href="uretimingelecegilogosiyaharkaplansiz.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #cbcbcb;
            --card-bg: #ffffff;
            --text-main: #000000;
            --primary-gray: #b2b2b2;
            --success: #16a34a;
            --danger: #df2311;
            --warning: #d97706;
            --border: #000000;
            --shadow: 0 6px 15px rgba(0, 0, 0, 0.35);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; touch-action: manipulation; }
        
        /* LOGIN MODAL */
        #login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background-color: var(--card-bg); padding: 40px; border-radius: 12px; width: 90%; max-width: 480px; text-align: center; box-shadow: var(--shadow); border: 2px solid var(--border); }
        .login-logo { height: 100px; margin-bottom: 20px; object-fit: contain; }
        .login-header-text { font-size: 1.8em; font-weight: 700; color: var(--primary-gray); margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
        .login-input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid var(--border); border-radius: 6px; font-size: 1.1em; text-transform: uppercase; outline: none; }
        .login-btn { width: 100%; padding: 15px; background-color: var(--primary-gray); color: white; border: none; border-radius: 6px; font-size: 1.2em; font-weight: 700; cursor: pointer; }

        /* HEADER & NAV */
        header { background-color: var(--card-bg); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary-gray); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo { height: 50px; object-fit: contain; }
        .clock-box { font-size: 1.2em; font-weight: 700; background: #f0f0f0; padding: 5px 12px; border-radius: 6px; border: 2px solid var(--border); font-family: monospace; }
        .header-slogan { font-size: 0.85em; font-weight: 900; }
        .operator-photo { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
        .mes-nav { display: flex; background-color: #e0e0e0; border-bottom: 2px solid var(--border); overflow-x: auto; white-space: nowrap; }
        .tab-btn { border: none; padding: 15px 20px; font-weight: 700; cursor: pointer; border-right: 1px solid #ccc; background: inherit; font-size: 0.8em; }
        .tab-btn.active { background-color: white; border-bottom: 5px solid var(--danger); color: var(--danger); }

        /* DASHBOARD */
        main { padding: 15px; max-width: 1600px; margin: 0 auto; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .card { background-color: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: var(--shadow); border-left: 8px solid var(--primary-gray); }
        .card h3 { margin-bottom: 12px; font-weight: 900; border-bottom: 2px solid #eee; padding-bottom: 8px; font-size: 0.9em; text-transform: uppercase; }
        .status-ok h1 { color: var(--success) !important; font-size: 2.2em; font-weight: 900; text-align: center;}
        
        /* MODAL */
        #m-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95vw; max-width: 700px; max-height: 90vh; overflow-y: auto; background: white; z-index: 9000; padding: 25px; border-radius: 12px; border: 3px solid var(--border); box-shadow: 0 0 100px rgba(0,0,0,0.7); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 8500; }

        /* TABLES & VIDEO */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.85em; font-weight: 700; }
        .video-box { width: 100%; height: 350px; background: #000; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; position: relative; }
        #webcam-video { width: 100%; height: 100%; object-fit: cover; }

        /* LANDSCAPE (YAN EKRAN) OPTİMİZASYONU */
        @media screen and (orientation: landscape) and (max-height: 500px) {
            header { padding: 5px 15px; }
            .logo { height: 35px; }
            .header-slogan { display: none; }
            .clock-box { font-size: 1em; padding: 2px 8px; }
            .operator-photo { width: 40px; height: 40px; }
            .tab-btn { padding: 8px 12px; font-size: 0.7em; }
            .dashboard-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 8px; }
            .card { padding: 10px; border-left-width: 5px; }
            #kpi-p, #kpi-d, #kpi-o { font-size: 2em !important; }
            #status-card h1 { font-size: 1.2em !important; }
            .login-box { padding: 15px; max-width: 400px; }
            .login-logo { height: 50px; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="login-modal">
        <div class="login-box">
            <img src="FOTM.jpg" class="login-logo">
            <h1 class="login-header-text">FOT-M MES SİSTEMİ</h1>
            <input type="text" id="username" class="login-input" placeholder="KULLANICI ADI">
            <input type="password" id="password" class="login-input" placeholder="ŞİFRE">
            <button class="login-btn" onclick="login()">SİSTEME GİRİŞ</button>
            <p id="login-error" style="color:var(--danger); margin-top:10px; font-weight:bold; display:none;"></p>
        </div>
    </div>

    <!-- ANA PANEL -->
    <div id="main-dashboard" style="display:none;">
        <header>
            <div class="header-left">
                <img src="FOTM.jpg" class="logo">
                <div class="clock-box" id="live-clock">00:00:00</div>
                <div class="slogan-group">
                    <img src="uretimingelecegilogobeyaz.png" class="logo" style="height: 40px;">
                    <span class="header-slogan">Üretimin Geleceği</span>
                </div>
            </div>
            <div class="header-right">
                <div style="text-align: right; margin-right: 10px;">
                    <p id="op-name" style="font-weight:900; font-size: 1em;"></p>
                    <p style="font-size: 0.7em; color: var(--success); font-weight: bold;">● ÇEVRİMİÇİ</p>
                </div>
                <img src="default.png" id="op-img" class="operator-photo">
            </div>
        </header>

        <nav class="mes-nav">
            <button class="tab-btn active" onclick="tab(event, 't1')">ANDON</button>
            <button class="tab-btn" onclick="tab(event, 't2')">İSTASYONLAR</button>
            <button class="tab-btn" onclick="tab(event, 't4')">ANALİZ</button>
            <button class="tab-btn" onclick="tab(event, 't5')">AI KAMERA</button>
        </nav>

        <main>
            <div id="t1" class="tab-content">
                <div class="dashboard-grid">
                    <div id="status-card" class="card status-ok" style="grid-column: 1/-1;"><h1>ÜRETİM AKTİF</h1></div>
                    <div class="card"><h3>TOPLAM ÜRETİM</h3><p id="kpi-p" style="font-size:3.5em; font-weight: 900;">0</p></div>
                    <div class="card"><h3>FİRE ADEDİ</h3><p id="kpi-d" style="font-size:3.5em; color:var(--danger); font-weight: 900;">0</p></div>
                    <div class="card"><h3>HAT OEE</h3><p id="kpi-o" style="font-size:3.5em; color:var(--success); font-weight: 900;">%0</p></div>
                    <div class="card" style="grid-column: 1/-1;"><h3>CANLI AKIŞ GÜNLÜĞÜ</h3><div id="log-list" style="max-height:150px; overflow-y:auto; font-family:monospace; font-size:0.9em;"></div></div>
                </div>
            </div>

            <div id="t2" class="tab-content" style="display:none;">
                <div class="card">
                    <h3>İSTASYON DURUMLARI</h3>
                    <div id="machine-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap:10px;"></div>
                </div>
            </div>

            <div id="t4" class="tab-content" style="display:none;">
                <div class="card">
                    <h3>OEE TRENDİ</h3>
                    <canvas id="chart-oee" height="150"></canvas>
                </div>
            </div>

            <div id="t5" class="tab-content" style="display:none;">
                <div class="card">
                    <h3>AI KALİTE KONTROL</h3>
                    <div style="margin-bottom:10px; display:flex; gap:5px;">
                        <select id="cam-sel" style="flex:1; padding:10px;"></select>
                        <button onclick="startCam()" style="padding:10px; background:var(--success); color:white; border:none; border-radius:5px;">AÇ</button>
                    </div>
                    <div class="video-box">
                        <video id="webcam-video" autoplay playsinline muted></video>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="overlay" onclick="closeM()"></div>
    <div id="m-modal">
        <h2 id="modal-name">Detaylar</h2>
        <div id="modal-content"></div>
        <button class="login-btn" style="margin-top:20px; background:var(--border);" onclick="closeM()">KAPAT</button>
    </div>

    <script>
        let running = true, pCount = 0, dCount = 0, ws = null, nNum = 0;
        let machines = [{id:'M1', n:'Pres 1', o:88, p:42},{id:'M2', n:'Montaj A', o:92, p:12},{id:'M3', n:'CNC 1', o:85, p:8}];

        // GİRİŞ FONKSİYONU
        async function login() {
            const u = $('#username').val().toLowerCase().trim();
            const p = $('#password').val().trim();
            const btn = $('.login-btn');
            
            btn.text("BAĞLANILIYOR...").prop('disabled', true);
            
            try {
                const res = await fetch('https://meskariyergunu.onrender.com/api/login', {
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({username:u, password:p})
                });
                const data = await res.json();
                if(res.ok) { 
                    $('#login-modal').fadeOut(); 
                    $('#main-dashboard').fadeIn(); 
                    $('#op-name').text(data.name); 
                    $('#op-img').attr('src', data.photo); 
                    init(); 
                } else { 
                    $('#login-error').fadeIn().text("Hatalı Giriş!"); 
                    btn.text("SİSTEME GİRİŞ").prop('disabled', false);
                }
            } catch(e) { 
                $('#login-error').fadeIn().text("Sunucu Yanıt Vermiyor!"); 
                btn.text("SİSTEME GİRİŞ").prop('disabled', false);
            }
        }

        function connectWS() { 
            ws = new WebSocket('wss://meskariyergunu.onrender.com/ws'); 
            ws.onmessage = (e) => { 
                const d = JSON.parse(e.data); 
                addLog(d.payload.log_message, d.type === 'error_event' ? 'red' : 'green'); 
            }; 
            ws.onclose = () => setTimeout(connectWS, 5000); 
        }

        function tab(e, id) { $('.tab-content').hide(); $('.tab-btn').removeClass('active'); $('#'+id).show(); $(e.currentTarget).addClass('active'); }
        function openM(id) { const m = machines.find(x => x.id === id); $('#modal-name').text(m.n); $('.overlay, #m-modal').fadeIn(); }
        function closeM() { $('.overlay, #m-modal').fadeOut(); }
        function addLog(m, cls) { const t = new Date().toLocaleTimeString(); $('#log-list').prepend(`<div style="color:${cls}; border-bottom:1px solid #ddd; padding:5px;">[${t}] ${m}</div>`); }

        function init() {
            setInterval(() => { $('#live-clock').text(new Date().toLocaleTimeString()); }, 1000);
            const mList = $('#machine-list');
            machines.forEach(m => {
                $('<button>').css({padding:'10px', background:'#eee', border:'1px solid #000', borderRadius:'5px'})
                    .text(m.n).click(()=>openM(m.id)).appendTo(mList);
            });
            
            setInterval(() => { 
                if(!running) return; 
                pCount++; if(Math.random()>0.95) dCount++; 
                $('#kpi-p').text(pCount); $('#kpi-d').text(dCount); 
                $('#kpi-o').text('%'+(pCount>0?((pCount-dCount)/pCount*100).toFixed(1):88)); 
            }, 3000);

            new Chart(document.getElementById('chart-oee'), {
                type:'line', 
                data:{labels:['Pzt','Sal','Çar','Per'], datasets:[{label:'OEE%', data:[82,85,84,89], borderColor:'#df2311'}]}
            });
            
            connectWS();
            listCams();
        }

        async function listCams() {
            const devs = await navigator.mediaDevices.enumerateDevices();
            const sel = $('#cam-sel');
            devs.filter(d => d.kind === 'videoinput').forEach((c, i) => {
                $('<option>').val(c.deviceId).text(c.label || `Kamera ${i+1}`).appendTo(sel);
            });
        }

        async function startCam() {
            const s = await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:$('#cam-sel').val()}}});
            document.getElementById('webcam-video').srcObject = s;
        }
    </script>
</body>
</html>
